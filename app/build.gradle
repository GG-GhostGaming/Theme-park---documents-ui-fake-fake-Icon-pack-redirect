apply plugin: 'com.android.application'
android {
    namespace 'com.user.iconpack'
    compileSdk 34
    defaultConfig {
        applicationId "com.user.iconpack"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }
    buildTypes { debug { minifyEnabled false } }
}

// Add required AndroidX libraries for FileProvider and DocumentFile
dependencies {
    implementation 'androidx.core:core:1.10.1'
    implementation 'androidx.documentfile:documentfile:1.0.1'
}
