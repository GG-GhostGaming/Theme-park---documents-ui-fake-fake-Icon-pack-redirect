name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: '34.0.0'
          components: |
            platform-tools
            build-tools;34.0.0
            platform;android-34

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.5'

      - name: Generate Gradle wrapper (if missing)
        run: |
          # generate a wrapper at the repo root if possible
          gradle wrapper --gradle-version 8.5 || true

      - name: Make wrapper executable (if present)
        run: |
          if [ -f ./gradlew ]; then chmod +x ./gradlew; fi

      - name: Build debug APK
        run: |
          # Build the app module explicitly. Prefer the wrapper if present.
          if [ -f ./gradlew ]; then
            ./gradlew -p app assembleDebug --no-daemon
          else
            gradle -p app assembleDebug --no-daemon
          fi

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
